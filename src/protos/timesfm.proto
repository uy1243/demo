syntax = "proto3";

service TimesFMService {
  rpc Predict(PredictRequest) returns (PredictResponse);
}

message PredictRequest {
  repeated double history = 1;  // 历史价格序列
  int32 horizon = 2;           // 预测步数
  string instrument = 3;        // 合约
}

message PredictResponse {
  repeated double mean = 1;     // 预测均值
  repeated double lower = 2;    // 下界
  repeated double upper = 3;    // 上界
  bool success = 4;
  string msg = 5;
}